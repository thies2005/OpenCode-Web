services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - OPENCODE_SERVER_URL=${SERVICE_URL_OPENCODE:-https://opencode.schuelken.uk}
    volumes:
      - opencode-config:/root/.config/opencode
      - opencode-local:/root/.local/share/opencode
      - opencode-home:/root/.opencode
      - workspace:/workspace
    networks:
      - coolify
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "coolify.port=4096"
      - "traefik.http.middlewares.opencode-auth.basicauth.users=opencode:$$2a$$10$$W5CYPjfVZblrptazWFvgXekfrgoWf3b9iRcqGZmu4$$SO02p3o1COG"
      - "coolify.traefik.middlewares=opencode-auth"

volumes:
  opencode-config:
  opencode-local:
  opencode-home:
  workspace:

networks:
  coolify:
    external: true
