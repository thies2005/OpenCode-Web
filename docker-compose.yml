services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Use Coolify's dynamic URL instead of hardcoding
      - OPENCODE_SERVER_URL=${SERVICE_URL_OPENCODE:-https://opencode.schuelken.uk}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
    volumes:
      - opencode-config:/root/.config/opencode
      - opencode-local:/root/.local/share/opencode
      - opencode-home:/root/.opencode
      - workspace:/workspace
    networks:
      - coolify
    restart: unless-stopped
    labels:
      # Stripped down to just enable routing to the container
      - "traefik.enable=true"
      - "coolify.port=4096"

volumes:
  opencode-config:
  opencode-local:
  opencode-home:
  workspace:

networks:
  coolify:
    external: true
