services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Use Coolify's dynamic URL instead of hardcoding
      - OPENCODE_SERVER_URL=${SERVICE_URL_OPENCODE:-https://opencode.schuelken.uk}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
    volumes:
      - opencode-config:/root/.config/opencode
      - opencode-local:/root/.local/share/opencode
      - opencode-home:/root/.opencode
      - workspace:/workspace
    networks:
      - coolify
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4096"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "coolify.port=4096"
      # Hardcoding the hash with double $$ for Traefik's own parser
      - "traefik.http.middlewares.opencode-auth.basicauth.users=opencode:$$2a$$10$$W5CYPjfVZblrptazWFvgXekfrgoWf3b9iRcqGZmu4.SO02p3o1COG"
      - "coolify.traefik.middlewares=opencode-auth"

volumes:
  opencode-config:
  opencode-local:
  opencode-home:
  workspace:

networks:
  coolify:
    external: true
