services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile
    tty: true
    stdin_open: true
    environment:
      - OPENCODE_SERVER_URL=https://opencode.schuelken.uk
      - OPENCODE_SERVER_USERNAME=
    volumes:
      - opencode-config:/root/.config/opencode
      - opencode-local:/root/.local/share/opencode
      - opencode-home:/root/.opencode
      - workspace:/workspace
    networks:
      - coolify
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.opencode-auth.basicauth.users=${OPENCODE_BASIC_AUTH}"
      - "traefik.http.routers.opencode.middlewares=opencode-auth"
      - "traefik.http.routers.opencode.rule=Host(`opencode.schuelken.uk`)"
      - "traefik.http.routers.opencode.entrypoints=websecure"
      - "traefik.http.routers.opencode.tls=true"
      - "traefik.http.routers.opencode.service=opencode"
      - "traefik.http.services.opencode.loadbalancer.server.port=4096"

volumes:
  opencode-config:
  opencode-local:
  opencode-home:
  workspace:

networks:
  coolify:
    external: true
