services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Use Coolify's dynamic URL instead of hardcoding
      - OPENCODE_SERVER_URL=${SERVICE_URL_OPENCODE:-https://opencode.schuelken.uk}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
    volumes:
      - opencode-config:/root/.config/opencode
      - opencode-local:/root/.local/share/opencode
      - opencode-home:/root/.opencode
      - workspace:/workspace
    networks:
      - coolify
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "coolify.port=4096"
      
      # Define the Basic Auth middleware using your environment variable
      - "traefik.http.middlewares.opencode-auth.basicauth.users=${OPENCODE_BASIC_AUTH}"
      
      # Explicitly attach the middleware to the router generated by Coolify
      - "traefik.http.routers.opencode.middlewares=opencode-auth"
      
      # Keep the shorthand as a fallback for Coolify's internal parser
      - "coolify.traefik.middlewares=opencode-auth"

volumes:
  opencode-config:
  opencode-local:
  opencode-home:
  workspace:

networks:
  coolify:
    external: true
